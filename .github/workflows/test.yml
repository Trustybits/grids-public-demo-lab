name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Skip the version-bump commit itself so it doesn't re-trigger the bump
    # workflow. Pull requests always run (head_commit is only set on pushes).
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Bump version to:') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
