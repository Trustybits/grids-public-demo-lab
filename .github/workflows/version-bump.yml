name: Version Bump

# ─────────────────────────────────────────────────────────────────────────────
# ⚠️ TEMPORARILY DISABLED — this workflow does NOT run automatically right now.
#
# The real trigger (workflow_run on "Test") is commented out below and replaced
# with a manual-only `workflow_dispatch`, so the file stays valid (no "invalid
# workflow file" error) but never fires on its own. As an extra safety net, the
# job's `if:` guard depends on `github.event.workflow_run.*`, which is empty for a
# manual dispatch — so even a manual run is a no-op until the real trigger is back.
#
# TO RE-ENABLE:
#   1. Uncomment the `workflow_run:` block below and delete the
#      `workflow_dispatch:` line.
#   2. Ensure the BUMP_APP_ID and BUMP_APP_PRIVATE_KEY secrets are set
#      (see app-token-setup.md).
# ─────────────────────────────────────────────────────────────────────────────
#
# Runs only after the Test workflow completes. We open a pull request with the
# bumped version rather than pushing straight to main.
#
# The PR is created with a token minted from a GitHub App (see app-token-setup.md),
# NOT the built-in GITHUB_TOKEN. The built-in token deliberately does not trigger
# other workflows, so a GITHUB_TOKEN-created PR would never run Test and could not
# satisfy branch protection. An App-created PR does trigger Test. This does not
# cause a loop: the bump PR's Test run is a `pull_request` event on a
# `version-bump-*` branch, so it fails this workflow's `push`/`main` guard below.
on:
  # Manual-only while disabled. Remove this line when re-enabling.
  workflow_dispatch:
  # --- Re-enable by uncommenting the trigger below ---
  # workflow_run:
  #   workflows: ["Test"]
  #   types:
  #     - completed

# Serialize so two test runs can't open competing bump PRs at the same time.
concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    # Guards:
    #  - only the canonical repo (forks never bump versions)
    #  - only when Test actually passed
    #  - only for pushes to main (not PR runs, not other branches)
    if: >-
      github.repository == 'Trustybits/grids-public-demo-lab' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BUMP_APP_ID }}
          private-key: ${{ secrets.BUMP_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # App token so the resulting PR triggers the Test workflow.
          token: ${{ steps.app-token.outputs.token }}

      - name: Skip if the latest commit is already a version bump
        id: guard
        run: |
          # A version bump only ever touches package.json + package-lock.json,
          # and within package.json only the "version" line. If the triggering
          # commit matches that shape, don't bump again (prevents a cascade when
          # a bump PR is merged, regardless of merge strategy).
          changed=$(git diff --name-only HEAD^ HEAD)
          only_pkg_files=true
          for f in $changed; do
            if [ "$f" != "package.json" ] && [ "$f" != "package-lock.json" ]; then
              only_pkg_files=false
            fi
          done
          non_version_changes=$(git diff HEAD^ HEAD -- package.json \
            | grep -E '^[+-]' | grep -vE '^[+-]{2}' | grep -v '"version"' | wc -l)
          if [ -n "$changed" ] && [ "$only_pkg_files" = true ] && [ "$non_version_changes" -eq 0 ]; then
            echo "Latest commit is a version bump; skipping."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if a version-bump PR is already open
        id: open_pr
        if: steps.guard.outputs.should_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("version-bump-"))] | length')
          if [ "$existing" -gt 0 ]; then
            echo "An open version-bump PR already exists; skipping."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.open_pr.outputs.should_bump == 'true'
        with:
          node-version: 24

      - name: Bump version
        id: bump
        if: steps.open_pr.outputs.should_bump == 'true'
        # Patches the version in package.json and package-lock.json directly (no
        # npm install) to avoid platform-dependent optional-dependency churn.
        run: |
          new_version=$(node scripts/bump-version.mjs)
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.open_pr.outputs.should_bump == 'true'
        env:
          # Must be the App token (not GITHUB_TOKEN) so opening the PR triggers Test.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          branch="version-bump-${NEW_VERSION}"
          # Attribute the commit to the App's bot identity.
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add package.json package-lock.json
          git commit -m "Bump version to: ${NEW_VERSION}"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Bump version to: ${NEW_VERSION}" \
            --body "Automated version bump to \`${NEW_VERSION}\`."
