name: Version Bump

# Runs only after the Test workflow completes. We open a pull request with the
# bumped version rather than pushing straight to main.
on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

# Serialize so two test runs can't open competing bump PRs at the same time.
concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    # Guards:
    #  - only the canonical repo (forks never bump versions)
    #  - only when Test actually passed
    #  - only for pushes to main (not PR runs, not other branches)
    if: >-
      github.repository == 'Trustybits/grids-public-demo-lab' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if the latest commit is already a version bump
        id: guard
        run: |
          # A version bump only ever touches package.json + package-lock.json,
          # and within package.json only the "version" line. If the triggering
          # commit matches that shape, don't bump again (prevents a cascade when
          # a bump PR is merged, regardless of merge strategy).
          changed=$(git diff --name-only HEAD^ HEAD)
          only_pkg_files=true
          for f in $changed; do
            if [ "$f" != "package.json" ] && [ "$f" != "package-lock.json" ]; then
              only_pkg_files=false
            fi
          done
          non_version_changes=$(git diff HEAD^ HEAD -- package.json \
            | grep -E '^[+-]' | grep -vE '^[+-]{2}' | grep -v '"version"' | wc -l)
          if [ -n "$changed" ] && [ "$only_pkg_files" = true ] && [ "$non_version_changes" -eq 0 ]; then
            echo "Latest commit is a version bump; skipping."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if a version-bump PR is already open
        id: open_pr
        if: steps.guard.outputs.should_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("version-bump-"))] | length')
          if [ "$existing" -gt 0 ]; then
            echo "An open version-bump PR already exists; skipping."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.open_pr.outputs.should_bump == 'true'
        with:
          node-version: 24
          cache: npm

      - name: Bump version
        id: bump
        if: steps.open_pr.outputs.should_bump == 'true'
        run: |
          new_version=$(node scripts/bump-version.mjs)
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Refresh lockfile
        if: steps.open_pr.outputs.should_bump == 'true'
        run: npm install

      - name: Open pull request
        if: steps.open_pr.outputs.should_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          branch="version-bump-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add package.json package-lock.json
          git commit -m "Bump version to: ${NEW_VERSION}"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Bump version to: ${NEW_VERSION}" \
            --body "Automated version bump to \`${NEW_VERSION}\`."
